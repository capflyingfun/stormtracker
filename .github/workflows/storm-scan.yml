name: Storm Push Scanner

on:
  schedule:
    # BACKUP ONLY. The reliable ~5 min cadence comes from the Cloudflare worker's
    # Cron Trigger (stormtracker-proxy), which calls this workflow via
    # workflow_dispatch every 5 min. GitHub Actions cron is best-effort and skips
    # runs constantly, so this native schedule runs at a low frequency purely as a
    # fallback in case the Cloudflare trigger is ever down. Don't tighten it back
    # to */5 — that just duplicates the Cloudflare dispatch with no benefit.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

concurrency:
  group: storm-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install scanner deps
        working-directory: scanner
        run: npm install --no-audit --no-fund

      - name: Run scan
        working-directory: scanner
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          SCANNER_SECRET: ${{ secrets.SCANNER_SECRET }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: node scan.js
