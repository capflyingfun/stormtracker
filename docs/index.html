<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StormTracker v1.50</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg-deep: #0a0e1a;
  --bg-card: #111827;
  --bg-surface: #1a2235;
  --bg-elevated: #243049;
  --border-subtle: #1e2d45;
  --border-accent: #3b82f6;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent-blue: #3b82f6;
  --accent-cyan: #22d3ee;
  --accent-green: #22c55e;
  --accent-yellow: #eab308;
  --accent-orange: #f97316;
  --accent-red: #ef4444;
  --accent-purple: #a855f7;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.4);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.5);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.6);
  --font-body: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --nav-height: 60px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  min-height: 100dvh;
  padding-bottom: calc(var(--nav-height) + 20px);
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}

.container { max-width: 520px; margin: 0 auto; padding: 0 12px; }

/* ===== HEADER ===== */
.app-header {
  text-align: center;
  padding: 20px 16px 12px;
  background: linear-gradient(180deg, rgba(59,130,246,0.08) 0%, transparent 100%);
  border-bottom: 1px solid var(--border-subtle);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.app-header h1 {
  font-size: 1.4em;
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.02em;
}
.app-header .version {
  font-size: 0.7em;
  color: var(--text-muted);
  margin-top: 2px;
  font-family: var(--font-mono);
}
.header-status {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-top: 6px;
  font-size: 0.75em;
  color: var(--text-secondary);
}
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent-green);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ===== CARDS ===== */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 16px;
  margin-bottom: 12px;
  transition: border-color 0.2s;
}
.card:hover { border-color: rgba(59,130,246,0.3); }
.card-title {
  font-size: 0.8em;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent-blue);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-title .icon { font-size: 1.1em; }

/* ===== LOCATION BAR ===== */
.location-bar {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 12px 16px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.location-bar input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-size: 0.9em;
  font-family: var(--font-body);
  outline: none;
}
.location-bar input::placeholder { color: var(--text-muted); }
.btn-icon {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-subtle);
  background: var(--bg-elevated);
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 1em;
  transition: all 0.15s;
}
.btn-icon:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
.btn-icon:active { transform: scale(0.92); }

/* ===== WEATHER HERO ===== */
.weather-hero {
  background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-surface) 100%);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 12px;
  text-align: center;
}
.hero-temp {
  font-size: 3.5em;
  font-weight: 800;
  line-height: 1;
  background: linear-gradient(180deg, var(--text-primary) 0%, var(--text-secondary) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero-condition {
  font-size: 1.1em;
  color: var(--text-secondary);
  margin-top: 4px;
}
.hero-location {
  font-size: 0.85em;
  color: var(--text-muted);
  margin-top: 8px;
  font-family: var(--font-mono);
}
.hero-detail-row {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 14px;
  flex-wrap: wrap;
}
.hero-detail {
  text-align: center;
}
.hero-detail-label {
  font-size: 0.65em;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
}
.hero-detail-value {
  font-size: 0.95em;
  font-weight: 600;
  color: var(--text-primary);
  margin-top: 2px;
}

/* ===== WEATHER GRID ===== */
.weather-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}
.weather-tile {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 14px;
  text-align: center;
}
.tile-icon { font-size: 1.4em; margin-bottom: 6px; }
.tile-label {
  font-size: 0.65em;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.tile-value {
  font-size: 1.15em;
  font-weight: 700;
  color: var(--text-primary);
}
.tile-sub {
  font-size: 0.7em;
  color: var(--text-secondary);
  margin-top: 2px;
}

/* ===== ALERTS ===== */
.alert-banner {
  border-radius: var(--radius-md);
  padding: 12px 16px;
  margin-bottom: 10px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 0.85em;
}
.alert-banner.safe {
  background: rgba(34,197,94,0.1);
  border: 1px solid rgba(34,197,94,0.2);
  color: var(--accent-green);
}
.alert-banner.warning {
  background: rgba(234,179,8,0.1);
  border: 1px solid rgba(234,179,8,0.2);
  color: var(--accent-yellow);
}
.alert-banner.danger {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.2);
  color: var(--accent-red);
}
.alert-banner .alert-icon { font-size: 1.2em; flex-shrink: 0; margin-top: 1px; }
.alert-text { line-height: 1.4; }
.alert-title { font-weight: 700; }

/* ===== MAP ===== */
.map-container {
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid var(--border-subtle);
  margin-bottom: 12px;
  height: 300px;
  position: relative;
}
#radar-map { height: 100%; width: 100%; background: var(--bg-deep); }
.map-overlay {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 500;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.map-btn {
  width: 32px; height: 32px;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(17,24,39,0.85);
  backdrop-filter: blur(10px);
  color: var(--text-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 0.85em;
  transition: all 0.15s;
}
.map-btn:hover { border-color: var(--accent-blue); }
.map-legend {
  position: absolute;
  bottom: 10px;
  left: 10px;
  z-index: 500;
  background: rgba(17,24,39,0.9);
  backdrop-filter: blur(10px);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  font-size: 0.6em;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 8px;
}
.legend-bar {
  display: flex;
  height: 8px;
  border-radius: 4px;
  overflow: hidden;
  width: 120px;
}
.legend-bar span { flex: 1; }

/* ===== STORM CELLS ===== */
.storm-cell-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 12px;
  margin-bottom: 8px;
}
.storm-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.storm-badge {
  font-size: 0.65em;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.storm-badge.light { background: rgba(34,197,94,0.15); color: var(--accent-green); }
.storm-badge.moderate { background: rgba(234,179,8,0.15); color: var(--accent-yellow); }
.storm-badge.heavy { background: rgba(249,115,22,0.15); color: var(--accent-orange); }
.storm-badge.intense { background: rgba(239,68,68,0.15); color: var(--accent-red); }
.storm-badge.extreme { background: rgba(168,85,247,0.15); color: var(--accent-purple); }
.storm-detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}
.storm-detail {
  text-align: center;
  padding: 6px 4px;
  background: var(--bg-card);
  border-radius: var(--radius-sm);
}
.storm-detail-label {
  font-size: 0.6em;
  text-transform: uppercase;
  color: var(--text-muted);
  letter-spacing: 0.04em;
}
.storm-detail-val {
  font-size: 0.85em;
  font-weight: 700;
  margin-top: 2px;
}

/* ===== FORECAST ===== */
.forecast-scroll {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 4px 0 8px;
  scrollbar-width: none;
}
.forecast-scroll::-webkit-scrollbar { display: none; }
.forecast-item {
  flex-shrink: 0;
  width: 72px;
  text-align: center;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 10px 6px;
}
.forecast-time {
  font-size: 0.65em;
  color: var(--text-muted);
  font-weight: 600;
  text-transform: uppercase;
}
.forecast-icon { font-size: 1.4em; margin: 6px 0; }
.forecast-temp { font-size: 0.9em; font-weight: 700; }
.forecast-hi { color: var(--text-primary); }
.forecast-lo { color: var(--text-muted); font-weight: 400; }

/* ===== NWS ALERTS ===== */
.nws-alert {
  background: var(--bg-surface);
  border-left: 3px solid var(--accent-red);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: 10px 12px;
  margin-bottom: 8px;
  font-size: 0.8em;
}
.nws-alert.watch { border-left-color: var(--accent-yellow); }
.nws-alert.advisory { border-left-color: var(--accent-orange); }
.nws-alert-title { font-weight: 700; margin-bottom: 4px; }
.nws-alert-detail { color: var(--text-secondary); line-height: 1.4; }

/* ===== STATION ===== */
.station-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}
.station-tile {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 10px;
  text-align: center;
}
.station-val {
  font-size: 1.05em;
  font-weight: 700;
  color: var(--text-primary);
}
.station-label {
  font-size: 0.6em;
  text-transform: uppercase;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  margin-top: 3px;
}
.station-sub {
  font-size: 0.65em;
  color: var(--text-secondary);
}
.metar-raw {
  font-family: var(--font-mono);
  font-size: 0.7em;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  padding: 10px;
  color: var(--accent-cyan);
  line-height: 1.6;
  word-break: break-all;
  margin-top: 10px;
}

/* ===== NAV ===== */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: var(--nav-height);
  background: rgba(10,14,26,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border-subtle);
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 2px;
  z-index: 200;
  padding: 0 8px;
}
.nav-item {
  flex: 1;
  max-width: 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 6px 4px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-family: var(--font-body);
}
.nav-item:hover { color: var(--text-secondary); }
.nav-item.active { color: var(--accent-blue); }
.nav-item .nav-icon { font-size: 1.3em; }
.nav-item .nav-label { font-size: 0.6em; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }

/* ===== SKELETON ===== */
.skeleton {
  background: linear-gradient(90deg, var(--bg-surface) 25%, var(--bg-elevated) 50%, var(--bg-surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--radius-sm);
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.skel-line { height: 16px; margin-bottom: 8px; }
.skel-block { height: 60px; margin-bottom: 10px; }
.skel-circle { width: 48px; height: 48px; border-radius: 50%; margin: 0 auto 10px; }

/* ===== TOAST ===== */
.toast-container {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast {
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 10px 18px;
  font-size: 0.8em;
  color: var(--text-primary);
  box-shadow: var(--shadow-lg);
  opacity: 0;
  transform: translateY(-10px);
  animation: toast-in 0.25s ease forwards;
  pointer-events: auto;
}
@keyframes toast-in {
  to { opacity: 1; transform: translateY(0); }
}
.toast.out {
  animation: toast-out 0.2s ease forwards;
}
@keyframes toast-out {
  to { opacity: 0; transform: translateY(-10px); }
}

/* ===== SECTION TABS ===== */
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 12px;
  padding: 3px;
  background: var(--bg-surface);
  border-radius: var(--radius-md);
}
.tab-btn {
  flex: 1;
  padding: 8px 6px;
  border: none;
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-muted);
  font-size: 0.75em;
  font-weight: 600;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.tab-btn.active {
  background: var(--accent-blue);
  color: white;
}
.tab-btn:hover:not(.active) { color: var(--text-secondary); }

/* ===== MISC ===== */
.section-page { display: none; }
.section-page.visible { display: block; }
.badge-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 18px;
  height: 18px;
  border-radius: 9px;
  background: var(--accent-red);
  color: white;
  font-size: 0.6em;
  font-weight: 700;
  padding: 0 5px;
}
.empty-state {
  text-align: center;
  padding: 30px 20px;
  color: var(--text-muted);
}
.empty-state .empty-icon { font-size: 2.5em; margin-bottom: 10px; }
.empty-state p { font-size: 0.85em; line-height: 1.5; }
.btn-primary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 20px;
  border: none;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--accent-blue), #2563eb);
  color: white;
  font-size: 0.85em;
  font-weight: 600;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all 0.15s;
}
.btn-primary:hover { filter: brightness(1.1); }
.btn-primary:active { transform: scale(0.96); }
.powered-by {
  text-align: center;
  padding: 20px;
  font-size: 0.65em;
  color: var(--text-muted);
}
.powered-by a { color: var(--accent-blue); text-decoration: none; }
.flt-cat {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.7em;
  font-weight: 700;
  letter-spacing: 0.06em;
}
.flt-vfr { background: rgba(34,197,94,0.15); color: #22c55e; }
.flt-mvfr { background: rgba(59,130,246,0.15); color: #3b82f6; }
.flt-ifr { background: rgba(239,68,68,0.15); color: #ef4444; }
.flt-lifr { background: rgba(236,72,153,0.15); color: #ec4899; }
.wind-compass {
  width: 100px; height: 100px;
  border-radius: 50%;
  border: 2px solid var(--border-subtle);
  position: relative;
  margin: 0 auto 10px;
  background: var(--bg-surface);
}
.wind-arrow {
  position: absolute;
  top: 50%; left: 50%;
  width: 4px; height: 40px;
  margin-left: -2px; margin-top: -35px;
  background: linear-gradient(180deg, var(--accent-cyan), transparent);
  transform-origin: 50% 35px;
  border-radius: 2px;
  transition: transform 0.5s ease;
}
.wind-arrow::after {
  content: '';
  position: absolute;
  top: -4px; left: 50%;
  transform: translateX(-50%);
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-bottom: 10px solid var(--accent-cyan);
}
.compass-label {
  position: absolute;
  font-size: 0.55em;
  font-weight: 700;
  color: var(--text-muted);
}
.compass-n { top: 4px; left: 50%; transform: translateX(-50%); color: var(--accent-cyan); }
.compass-s { bottom: 4px; left: 50%; transform: translateX(-50%); }
.compass-e { right: 6px; top: 50%; transform: translateY(-50%); }
.compass-w { left: 6px; top: 50%; transform: translateY(-50%); }
</style>
</head>
<body>

<div class="toast-container" id="toast-container"></div>

<!-- HEADER -->
<header class="app-header">
  <h1>⚡ StormTracker</h1>
  <div class="version">v1.50 &middot; Real-time Storm Detection</div>
  <div class="header-status">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Connecting...</span>
  </div>
</header>

<div class="container">

  <!-- LOCATION -->
  <div class="location-bar">
    <span style="font-size:1.1em">📍</span>
    <input type="text" id="location-input" placeholder="Search city or ZIP..." autocomplete="off">
    <button class="btn-icon" id="btn-gps" title="Use GPS">🛰️</button>
    <button class="btn-icon" id="btn-search" title="Search">🔍</button>
  </div>

  <!-- PAGE SECTIONS -->
  <div id="page-weather" class="section-page visible"></div>
  <div id="page-radar" class="section-page"></div>
  <div id="page-storms" class="section-page"></div>
  <div id="page-station" class="section-page"></div>
  <div id="page-alerts" class="section-page"></div>

</div>

<div class="powered-by">
  Powered by <a href="https://stormtracker.onrender.com" target="_blank">StormTracker on Render</a> &middot; NWS &middot; RainViewer &middot; OpenWeather
</div>

<!-- NAV -->
<nav class="bottom-nav">
  <button class="nav-item active" data-page="weather"><span class="nav-icon">🌤️</span><span class="nav-label">Weather</span></button>
  <button class="nav-item" data-page="radar"><span class="nav-icon">📡</span><span class="nav-label">Radar</span></button>
  <button class="nav-item" data-page="storms"><span class="nav-icon">🌪️</span><span class="nav-label">Storms</span></button>
  <button class="nav-item" data-page="station"><span class="nav-icon">🏢</span><span class="nav-label">Station</span></button>
  <button class="nav-item" data-page="alerts"><span class="nav-icon">⚠️</span><span class="nav-label">Alerts</span></button>
</nav>

<script>
const API = 'https://stormtracker.onrender.com';
let STATE = {
  lat: null, lon: null,
  locationName: '',
  weather: null,
  storms: null,
  alerts: [],
  station: null,
  stationIcao: null,
  radarFrames: [],
  currentPage: 'weather',
  map: null,
  radarLayer: null,
};

// ========== UTILITIES ==========
function toast(msg) {
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => { el.classList.add('out'); setTimeout(() => el.remove(), 250); }, 3000);
}

async function apiFetch(path, opts = {}) {
  const url = API + path;
  const res = await fetch(url, { ...opts, headers: { 'Content-Type': 'application/json', ...(opts.headers||{}) } });
  if (!res.ok) throw new Error(`API ${res.status}`);
  return res.json();
}

function degToCompass(d) {
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(d / 22.5) % 16];
}

function mpsToMph(mps) { return (mps * 2.237).toFixed(0); }
function kelvinToF(k) { return ((k - 273.15) * 9/5 + 32).toFixed(0); }
function kelvinToC(k) { return (k - 273.15).toFixed(0); }
function mToMi(m) { return (m / 1609.34).toFixed(1); }

function weatherIcon(id, isDay) {
  if (id >= 200 && id < 300) return '⛈️';
  if (id >= 300 && id < 400) return '🌦️';
  if (id >= 500 && id < 600) return '🌧️';
  if (id >= 600 && id < 700) return '🌨️';
  if (id >= 700 && id < 800) return '🌫️';
  if (id === 800) return isDay ? '☀️' : '🌙';
  if (id === 801) return isDay ? '🌤️' : '☁️';
  if (id <= 804) return '☁️';
  return '🌡️';
}

function stormCategory(dbz) {
  if (dbz >= 55) return { label: 'Extreme', cls: 'extreme' };
  if (dbz >= 45) return { label: 'Intense', cls: 'intense' };
  if (dbz >= 35) return { label: 'Heavy', cls: 'heavy' };
  if (dbz >= 20) return { label: 'Moderate', cls: 'moderate' };
  return { label: 'Light', cls: 'light' };
}

function showSkeleton(el, lines = 3) {
  el.innerHTML = Array.from({length: lines}, (_, i) =>
    `<div class="skeleton skel-line" style="width:${70 + Math.random()*30}%"></div>`
  ).join('');
}

// ========== NAVIGATION ==========
document.querySelectorAll('.nav-item').forEach(btn => {
  btn.addEventListener('click', () => {
    const page = btn.dataset.page;
    STATE.currentPage = page;
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.section-page').forEach(p => p.classList.remove('visible'));
    document.getElementById('page-' + page).classList.add('visible');
    if (page === 'radar' && STATE.lat) initRadarMap();
    if (page === 'station' && STATE.lat && !STATE.station) fetchStation();
    if (page === 'alerts' && STATE.lat) fetchAlerts();
  });
});

// ========== LOCATION ==========
document.getElementById('btn-gps').addEventListener('click', () => {
  if (!navigator.geolocation) { toast('GPS not available'); return; }
  toast('Getting location...');
  navigator.geolocation.getCurrentPosition(
    pos => { setLocation(pos.coords.latitude, pos.coords.longitude); },
    () => toast('Location access denied'),
    { enableHighAccuracy: true, timeout: 10000 }
  );
});

document.getElementById('btn-search').addEventListener('click', searchLocation);
document.getElementById('location-input').addEventListener('keypress', e => {
  if (e.key === 'Enter') searchLocation();
});

async function searchLocation() {
  const q = document.getElementById('location-input').value.trim();
  if (!q) return;
  try {
    toast('Searching...');
    const data = await apiFetch('/api/geocode', {
      method: 'POST',
      body: JSON.stringify({ query: q })
    });
    if (data.lat && data.lon) {
      setLocation(data.lat, data.lon, data.name || q);
    } else {
      toast('Location not found');
    }
  } catch(e) {
    toast('Search failed - try again');
  }
}

function setLocation(lat, lon, name) {
  STATE.lat = lat;
  STATE.lon = lon;
  STATE.locationName = name || `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
  document.getElementById('location-input').value = STATE.locationName;
  document.getElementById('status-dot').style.background = 'var(--accent-green)';
  document.getElementById('status-text').textContent = 'Live';
  try { localStorage.setItem('st_loc', JSON.stringify({lat, lon, name: STATE.locationName})); } catch(e){}
  fetchWeather();
  fetchStorms();
  STATE.station = null;
  STATE.stationIcao = null;
  if (STATE.currentPage === 'radar') initRadarMap();
  if (STATE.currentPage === 'station') fetchStation();
  if (STATE.currentPage === 'alerts') fetchAlerts();
}

// ========== WEATHER ==========
async function fetchWeather() {
  const el = document.getElementById('page-weather');
  showSkeleton(el, 6);
  try {
    const data = await apiFetch('/api/weather', {
      method: 'POST',
      body: JSON.stringify({ lat: STATE.lat, lon: STATE.lon })
    });
    STATE.weather = data;
    renderWeather();
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>Could not load weather data.<br>The server may be waking up — try again in 30 seconds.</p></div>`;
  }
}

function renderWeather() {
  const w = STATE.weather;
  if (!w) return;
  const el = document.getElementById('page-weather');
  const cur = w.current || w;
  const main = cur.main || {};
  const weather = (cur.weather || [])[0] || {};
  const wind = cur.wind || {};
  const clouds = cur.clouds || {};
  const sys = cur.sys || {};
  const isDay = sys.sunrise && sys.sunset ? (Date.now()/1000 > sys.sunrise && Date.now()/1000 < sys.sunset) : true;
  const tempF = main.temp ? kelvinToF(main.temp) : '--';
  const tempC = main.temp ? kelvinToC(main.temp) : '--';
  const feelsF = main.feels_like ? kelvinToF(main.feels_like) : '--';
  const icon = weatherIcon(weather.id, isDay);

  el.innerHTML = `
    <div class="weather-hero">
      <div style="font-size:2.5em; margin-bottom: 4px;">${icon}</div>
      <div class="hero-temp">${tempF}°</div>
      <div class="hero-condition">${weather.description ? weather.description.charAt(0).toUpperCase() + weather.description.slice(1) : 'N/A'}</div>
      <div class="hero-location">📍 ${STATE.locationName}</div>
      <div class="hero-detail-row">
        <div class="hero-detail"><div class="hero-detail-label">Feels Like</div><div class="hero-detail-value">${feelsF}°F</div></div>
        <div class="hero-detail"><div class="hero-detail-label">Celsius</div><div class="hero-detail-value">${tempC}°C</div></div>
        <div class="hero-detail"><div class="hero-detail-label">Humidity</div><div class="hero-detail-value">${main.humidity || '--'}%</div></div>
        <div class="hero-detail"><div class="hero-detail-label">Pressure</div><div class="hero-detail-value">${main.pressure || '--'} mb</div></div>
      </div>
    </div>
    <div class="weather-grid">
      <div class="weather-tile">
        <div class="tile-icon">💨</div>
        <div class="tile-label">Wind</div>
        <div class="tile-value">${wind.speed ? mpsToMph(wind.speed) : '--'} mph</div>
        <div class="tile-sub">${wind.deg != null ? degToCompass(wind.deg) : '--'}${wind.gust ? ' · G'+mpsToMph(wind.gust) : ''}</div>
      </div>
      <div class="weather-tile">
        <div class="tile-icon">👁️</div>
        <div class="tile-label">Visibility</div>
        <div class="tile-value">${cur.visibility ? mToMi(cur.visibility) : '--'} mi</div>
        <div class="tile-sub">${cur.visibility ? (cur.visibility/1000).toFixed(1)+' km' : ''}</div>
      </div>
      <div class="weather-tile">
        <div class="tile-icon">☁️</div>
        <div class="tile-label">Clouds</div>
        <div class="tile-value">${clouds.all != null ? clouds.all : '--'}%</div>
        <div class="tile-sub">Coverage</div>
      </div>
      <div class="weather-tile">
        <div class="tile-icon">💧</div>
        <div class="tile-label">Dew Point</div>
        <div class="tile-value">${main.temp && main.humidity ? calcDewPoint(main.temp, main.humidity) : '--'}°F</div>
        <div class="tile-sub">Moisture</div>
      </div>
    </div>
    ${renderForecast(w)}
  `;
}

function calcDewPoint(tempK, rh) {
  const tc = tempK - 273.15;
  const a = 17.27, b = 237.7;
  const gamma = (a * tc) / (b + tc) + Math.log(rh / 100);
  const dpC = (b * gamma) / (a - gamma);
  return ((dpC * 9/5) + 32).toFixed(0);
}

function renderForecast(w) {
  const list = w.forecast || w.list;
  if (!list || !list.length) return '';
  const items = list.slice(0, 8);
  return `
    <div class="card">
      <div class="card-title"><span class="icon">📊</span> Forecast</div>
      <div class="forecast-scroll">
        ${items.map(f => {
          const dt = new Date(f.dt * 1000);
          const hr = dt.getHours();
          const ampm = hr >= 12 ? 'PM' : 'AM';
          const h12 = hr % 12 || 12;
          const ww = (f.weather || [])[0] || {};
          const hi = f.main ? kelvinToF(f.main.temp_max || f.main.temp) : '--';
          const lo = f.main ? kelvinToF(f.main.temp_min || f.main.temp) : '';
          return `<div class="forecast-item">
            <div class="forecast-time">${h12}${ampm}</div>
            <div class="forecast-icon">${weatherIcon(ww.id, hr > 6 && hr < 20)}</div>
            <div class="forecast-temp"><span class="forecast-hi">${hi}°</span></div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

// ========== RADAR MAP ==========
function initRadarMap() {
  if (!STATE.lat) return;
  const el = document.getElementById('page-radar');
  el.innerHTML = `
    <div class="card-title"><span class="icon">📡</span> Live Radar</div>
    <div class="map-container">
      <div id="radar-map"></div>
      <div class="map-legend">
        <span>dBZ</span>
        <div class="legend-bar">
          <span style="background:#00ff00"></span>
          <span style="background:#ffff00"></span>
          <span style="background:#ff8800"></span>
          <span style="background:#ff0000"></span>
          <span style="background:#cc00cc"></span>
        </div>
        <span>Light → Extreme</span>
      </div>
    </div>
    <div style="font-size:0.7em; color:var(--text-muted); text-align:center; margin-top:6px;">
      Radar data from RainViewer &middot; Updated every 10 min
    </div>
  `;
  setTimeout(() => {
    if (STATE.map) { STATE.map.remove(); STATE.map = null; }
    const map = L.map('radar-map', { zoomControl: false, attributionControl: false }).setView([STATE.lat, STATE.lon], 8);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 18
    }).addTo(map);
    L.marker([STATE.lat, STATE.lon]).addTo(map);
    STATE.map = map;
    loadRadarTiles(map);
  }, 100);
}

async function loadRadarTiles(map) {
  try {
    const data = await fetch('https://api.rainviewer.com/public/weather-maps.json').then(r => r.json());
    const frames = data.radar?.past || [];
    if (frames.length > 0) {
      const latest = frames[frames.length - 1];
      if (STATE.radarLayer) map.removeLayer(STATE.radarLayer);
      STATE.radarLayer = L.tileLayer(
        `https://tilecache.rainviewer.com${latest.path}/256/{z}/{x}/{y}/6/1_1.png`,
        { opacity: 0.7, maxZoom: 18 }
      ).addTo(map);
    }
  } catch(e) {}
}

// ========== STORMS ==========
async function fetchStorms() {
  const el = document.getElementById('page-storms');
  showSkeleton(el, 4);
  try {
    const data = await apiFetch('/api/storms', {
      method: 'POST',
      body: JSON.stringify({ lat: STATE.lat, lon: STATE.lon, radius: 80 })
    });
    STATE.storms = data;
    renderStorms();
  } catch(e) {
    renderStorms();
  }
}

function renderStorms() {
  const el = document.getElementById('page-storms');
  const storms = STATE.storms?.storms || STATE.storms || [];
  const stormList = Array.isArray(storms) ? storms : [];

  if (!stormList.length) {
    el.innerHTML = `
      <div class="alert-banner safe">
        <span class="alert-icon">✅</span>
        <div class="alert-text"><span class="alert-title">All Clear</span><br>No storm cells detected within scan range.</div>
      </div>
      <div class="card">
        <div class="card-title"><span class="icon">🌪️</span> Storm Tracker</div>
        <div class="empty-state">
          <div class="empty-icon">🛰️</div>
          <p>Monitoring ${STATE.locationName || 'your area'}<br>Detection radius: 80 miles<br>Sources: NEXRAD · RainViewer</p>
        </div>
      </div>
    `;
    return;
  }

  el.innerHTML = `
    <div class="alert-banner ${stormList.some(s => s.dbz >= 45) ? 'danger' : 'warning'}">
      <span class="alert-icon">${stormList.some(s => s.dbz >= 45) ? '🚨' : '⚠️'}</span>
      <div class="alert-text"><span class="alert-title">${stormList.length} Storm Cell${stormList.length>1?'s':''} Detected</span></div>
    </div>
    <div class="card">
      <div class="card-title"><span class="icon">🌪️</span> Active Storm Cells</div>
      ${stormList.slice(0, 10).map(s => {
        const cat = stormCategory(s.dbz || s.intensity || 0);
        const dist = s.distance ? s.distance.toFixed(1) : '--';
        const bearing = s.bearing ? degToCompass(s.bearing) : '--';
        return `<div class="storm-cell-card">
          <div class="storm-header">
            <span style="font-weight:700">${s.dbz >= 40 ? '⚡' : '🌧️'} Storm Cell</span>
            <span class="storm-badge ${cat.cls}">${cat.label}</span>
          </div>
          <div class="storm-detail-grid">
            <div class="storm-detail"><div class="storm-detail-label">Intensity</div><div class="storm-detail-val">${(s.dbz || s.intensity || 0).toFixed(0)} dBZ</div></div>
            <div class="storm-detail"><div class="storm-detail-label">Distance</div><div class="storm-detail-val">${dist} mi</div></div>
            <div class="storm-detail"><div class="storm-detail-label">Bearing</div><div class="storm-detail-val">${bearing}</div></div>
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
}

// ========== STATION ==========
async function fetchStation() {
  const el = document.getElementById('page-station');
  showSkeleton(el, 5);
  try {
    const nearby = await apiFetch(`/api/nearby-stations?lat=${STATE.lat}&lon=${STATE.lon}`);
    const stations = nearby.stations || nearby;
    if (!stations || !stations.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">📡</div><p>No weather stations found nearby.</p></div>`;
      return;
    }
    const icao = stations[0].icaoId || stations[0].stationId || stations[0].icao;
    STATE.stationIcao = icao;
    const data = await apiFetch(`/api/station-data/${icao}`);
    STATE.station = data;
    renderStation();
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📡</div><p>Station data unavailable.<br>Server may be warming up.</p></div>`;
  }
}

function renderStation() {
  const el = document.getElementById('page-station');
  const s = STATE.station;
  if (!s) return;
  const obs = s.observation || s;
  const tempC = obs.temp != null ? parseFloat(obs.temp) : null;
  const tempF = tempC != null ? (tempC * 9/5 + 32).toFixed(0) : '--';
  const dpC = obs.dewp != null ? parseFloat(obs.dewp) : null;
  const dpF = dpC != null ? (dpC * 9/5 + 32).toFixed(0) : '--';
  const windMph = obs.wspd != null ? (parseFloat(obs.wspd) * 1.151).toFixed(0) : '--';
  const gustMph = obs.wgst != null ? (parseFloat(obs.wgst) * 1.151).toFixed(0) : null;
  const windDir = obs.wdir != null ? parseFloat(obs.wdir) : null;
  const vis = obs.visib != null ? parseFloat(obs.visib) : null;
  const altim = obs.altim != null ? parseFloat(obs.altim) : null;
  const fltCat = s.fltCat || obs.fltCat || 'VFR';
  const fltCls = fltCat === 'VFR' ? 'vfr' : fltCat === 'MVFR' ? 'mvfr' : fltCat === 'IFR' ? 'ifr' : 'lifr';
  const rawMetar = obs.rawOb || obs.rawMETAR || '';

  el.innerHTML = `
    <div class="card">
      <div class="card-title"><span class="icon">🏢</span> Weather Station — ${STATE.stationIcao}</div>
      <div style="text-align:center; margin-bottom:12px;">
        <span class="flt-cat flt-${fltCls}">${fltCat === 'VFR' ? '●' : '◉'} ${fltCat}</span>
      </div>
      <div class="wind-compass">
        <span class="compass-label compass-n">N</span>
        <span class="compass-label compass-s">S</span>
        <span class="compass-label compass-e">E</span>
        <span class="compass-label compass-w">W</span>
        <div class="wind-arrow" style="transform: rotate(${windDir != null ? windDir : 0}deg)"></div>
      </div>
      <div style="text-align:center; margin-bottom:14px;">
        <div style="font-size:1.2em; font-weight:700;">${windMph} mph ${windDir != null ? degToCompass(windDir) : ''}</div>
        ${gustMph ? `<div style="font-size:0.8em; color:var(--accent-orange);">Gusts ${gustMph} mph</div>` : ''}
      </div>
      <div class="station-grid">
        <div class="station-tile">
          <div class="station-val">${tempF}°F</div>
          <div class="station-label">Temp</div>
          <div class="station-sub">${tempC != null ? tempC.toFixed(1) : '--'}°C</div>
        </div>
        <div class="station-tile">
          <div class="station-val">${dpF}°F</div>
          <div class="station-label">Dew Point</div>
          <div class="station-sub">${dpC != null ? dpC.toFixed(1) : '--'}°C</div>
        </div>
        <div class="station-tile">
          <div class="station-val">${obs.relh != null ? parseFloat(obs.relh).toFixed(0) : '--'}%</div>
          <div class="station-label">Humidity</div>
        </div>
        <div class="station-tile">
          <div class="station-val">${altim != null ? (altim * 0.02953).toFixed(2) : '--'}</div>
          <div class="station-label">Pressure</div>
          <div class="station-sub">inHg</div>
        </div>
        <div class="station-tile">
          <div class="station-val">${vis != null ? vis.toFixed(1) : '--'}</div>
          <div class="station-label">Visibility</div>
          <div class="station-sub">SM</div>
        </div>
        <div class="station-tile">
          <div class="station-val">${obs.cover || '--'}</div>
          <div class="station-label">Sky</div>
        </div>
      </div>
      ${rawMetar ? `<div class="metar-raw">${rawMetar}</div>` : ''}
    </div>
  `;
}

// ========== ALERTS ==========
async function fetchAlerts() {
  const el = document.getElementById('page-alerts');
  showSkeleton(el, 3);
  try {
    const data = await apiFetch(`/api/nws-alerts?lat=${STATE.lat}&lon=${STATE.lon}`);
    STATE.alerts = data.features || data.alerts || data || [];
    renderAlerts();
  } catch(e) {
    renderAlerts();
  }
}

function renderAlerts() {
  const el = document.getElementById('page-alerts');
  const alerts = Array.isArray(STATE.alerts) ? STATE.alerts : [];

  if (!alerts.length) {
    el.innerHTML = `
      <div class="alert-banner safe">
        <span class="alert-icon">✅</span>
        <div class="alert-text"><span class="alert-title">No Active Alerts</span><br>No NWS warnings or watches for your area.</div>
      </div>
    `;
    return;
  }

  el.innerHTML = `
    <div class="card">
      <div class="card-title"><span class="icon">⚠️</span> NWS Alerts (${alerts.length})</div>
      ${alerts.slice(0, 10).map(a => {
        const props = a.properties || a;
        const event = props.event || props.headline || 'Alert';
        const desc = props.description || '';
        const sev = props.severity || '';
        const cls = sev === 'Extreme' || sev === 'Severe' ? '' : sev === 'Moderate' ? 'watch' : 'advisory';
        return `<div class="nws-alert ${cls}">
          <div class="nws-alert-title">${event}</div>
          <div class="nws-alert-detail">${desc.substring(0, 200)}${desc.length > 200 ? '...' : ''}</div>
        </div>`;
      }).join('')}
    </div>
  `;
}

// ========== INIT ==========
async function init() {
  document.getElementById('status-text').textContent = 'Initializing...';
  
  // Try saved location
  try {
    const saved = JSON.parse(localStorage.getItem('st_loc'));
    if (saved && saved.lat) {
      setLocation(saved.lat, saved.lon, saved.name);
      return;
    }
  } catch(e) {}

  // Try GPS
  if (navigator.geolocation) {
    document.getElementById('status-text').textContent = 'Getting location...';
    navigator.geolocation.getCurrentPosition(
      pos => setLocation(pos.coords.latitude, pos.coords.longitude),
      () => {
        document.getElementById('status-dot').style.background = 'var(--accent-yellow)';
        document.getElementById('status-text').textContent = 'Enter location to begin';
        document.getElementById('page-weather').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📍</div>
            <p>Search for a city or tap the GPS button to get started.</p>
          </div>
        `;
      },
      { enableHighAccuracy: true, timeout: 8000 }
    );
  } else {
    document.getElementById('status-dot').style.background = 'var(--accent-yellow)';
    document.getElementById('status-text').textContent = 'Enter location to begin';
  }
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();
</script>

</body>
</html>
