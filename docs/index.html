<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>StormTracker v1.52</title>
<meta name="description" content="Real-time storm detection with live radar, weather alerts, and storm tracking. No account required.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg-deep: #0a0e1a;
  --bg-card: #111827;
  --bg-surface: #1a2235;
  --bg-elevated: #243049;
  --border-subtle: #1e2d45;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent-blue: #3b82f6;
  --accent-cyan: #22d3ee;
  --accent-green: #22c55e;
  --accent-yellow: #eab308;
  --accent-orange: #f97316;
  --accent-red: #ef4444;
  --accent-purple: #a855f7;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --shadow-md: 0 4px 20px rgba(0,0,0,0.5);
  --font-body: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --nav-height: 60px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg-deep);color:var(--text-primary);min-height:100vh;min-height:100dvh;padding-bottom:calc(var(--nav-height)+20px);overscroll-behavior:none;-webkit-font-smoothing:antialiased}
.container{max-width:520px;margin:0 auto;padding:0 12px}
.app-header{text-align:center;padding:20px 16px 12px;background:linear-gradient(180deg,rgba(59,130,246,0.08) 0%,transparent 100%);border-bottom:1px solid var(--border-subtle);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.app-header h1{font-size:1.4em;font-weight:800;background:linear-gradient(135deg,var(--accent-blue),var(--accent-cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.app-header .version{font-size:0.7em;color:var(--text-muted);margin-top:2px;font-family:var(--font-mono)}
.header-status{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:6px;font-size:0.75em;color:var(--text-secondary)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-yellow);animation:pulse-dot 2s ease-in-out infinite}
.status-dot.live{background:var(--accent-green)}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.4}}
.card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px}
.card:hover{border-color:rgba(59,130,246,0.3)}
.card-title{font-size:0.8em;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent-blue);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.location-bar{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.location-bar input{flex:1;background:transparent;border:none;color:var(--text-primary);font-size:0.9em;font-family:var(--font-body);outline:none}
.location-bar input::placeholder{color:var(--text-muted)}
.btn-icon{width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border-subtle);background:var(--bg-elevated);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1em;transition:all 0.15s;flex-shrink:0}
.btn-icon:hover{border-color:var(--accent-blue);color:var(--accent-blue)}
.btn-icon:active{transform:scale(0.92)}
.weather-hero{background:linear-gradient(135deg,var(--bg-card) 0%,var(--bg-surface) 100%);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:20px;margin-bottom:12px;text-align:center}
.hero-temp{font-size:3.5em;font-weight:800;line-height:1;background:linear-gradient(180deg,var(--text-primary) 0%,var(--text-secondary) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;cursor:pointer}
.hero-condition{font-size:1.1em;color:var(--text-secondary);margin-top:4px;text-transform:capitalize}
.hero-location{font-size:0.85em;color:var(--text-muted);margin-top:8px;font-family:var(--font-mono)}
.hero-detail-row{display:flex;justify-content:center;gap:20px;margin-top:14px;flex-wrap:wrap}
.hero-detail{text-align:center}
.hero-detail-label{font-size:0.65em;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted)}
.hero-detail-value{font-size:0.95em;font-weight:600;color:var(--text-primary);margin-top:2px}
.weather-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.weather-tile{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:14px;text-align:center;cursor:pointer;transition:border-color 0.15s;-webkit-user-select:none;user-select:none}
.weather-tile:active{border-color:var(--accent-blue)}
.tile-icon{font-size:1.4em;margin-bottom:6px}
.tile-label{font-size:0.65em;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin-bottom:4px}
.tile-value{font-size:1.15em;font-weight:700}
.tile-sub{font-size:0.7em;color:var(--text-secondary);margin-top:2px}
.tile-tap{font-size:0.55em;color:var(--accent-cyan);margin-top:4px;opacity:0.7}
.alert-banner{border-radius:var(--radius-md);padding:12px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:10px;font-size:0.85em}
.alert-banner.safe{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);color:var(--accent-green)}
.alert-banner.warning{background:rgba(234,179,8,0.1);border:1px solid rgba(234,179,8,0.2);color:var(--accent-yellow)}
.alert-banner.danger{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:var(--accent-red)}
.alert-icon{font-size:1.2em;flex-shrink:0;margin-top:1px}
.alert-text{line-height:1.4}
.alert-title{font-weight:700}
.map-container{border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border-subtle);margin-bottom:12px;height:320px;position:relative}
#radar-map{height:100%;width:100%;background:var(--bg-deep)}
.map-legend{position:absolute;bottom:10px;left:10px;z-index:500;background:rgba(17,24,39,0.9);backdrop-filter:blur(10px);border-radius:var(--radius-sm);padding:6px 10px;font-size:0.6em;color:var(--text-secondary);display:flex;align-items:center;gap:8px}
.legend-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;width:120px}
.legend-bar span{flex:1}
.radar-time-label{position:absolute;top:10px;left:10px;z-index:500;background:rgba(17,24,39,0.9);backdrop-filter:blur(10px);border-radius:var(--radius-sm);padding:4px 10px;font-size:0.65em;color:var(--accent-cyan);font-family:var(--font-mono)}
.map-controls{position:absolute;top:10px;right:10px;z-index:500;display:flex;flex-direction:column;gap:4px}
.map-ctrl-btn{width:32px;height:32px;border-radius:6px;background:rgba(17,24,39,0.85);border:1px solid rgba(255,255,255,0.12);color:var(--text-primary);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.8em;backdrop-filter:blur(10px)}
.map-ctrl-btn:hover{border-color:var(--accent-blue)}
.storm-cell-card{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:12px;margin-bottom:8px}
.storm-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.storm-badge{font-size:0.65em;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:0.05em}
.storm-badge.light{background:rgba(34,197,94,0.15);color:var(--accent-green)}
.storm-badge.moderate{background:rgba(234,179,8,0.15);color:var(--accent-yellow)}
.storm-badge.heavy{background:rgba(249,115,22,0.15);color:var(--accent-orange)}
.storm-badge.intense{background:rgba(239,68,68,0.15);color:var(--accent-red)}
.storm-badge.extreme{background:rgba(168,85,247,0.15);color:var(--accent-purple)}
.storm-detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.storm-detail{text-align:center;padding:6px 4px;background:var(--bg-card);border-radius:var(--radius-sm)}
.storm-detail-label{font-size:0.6em;text-transform:uppercase;color:var(--text-muted);letter-spacing:0.04em}
.storm-detail-val{font-size:0.85em;font-weight:700;margin-top:2px}
.forecast-scroll{display:flex;gap:8px;overflow-x:auto;padding:4px 0 8px;scrollbar-width:none}
.forecast-scroll::-webkit-scrollbar{display:none}
.forecast-item{flex-shrink:0;width:72px;text-align:center;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:10px 6px}
.forecast-time{font-size:0.65em;color:var(--text-muted);font-weight:600}
.forecast-icon{font-size:1.4em;margin:6px 0}
.forecast-temp{font-size:0.9em;font-weight:700}
.nws-alert{background:var(--bg-surface);border-left:3px solid var(--accent-red);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 12px;margin-bottom:8px;font-size:0.8em}
.nws-alert.watch{border-left-color:var(--accent-yellow)}
.nws-alert.advisory{border-left-color:var(--accent-orange)}
.nws-alert-title{font-weight:700;margin-bottom:4px}
.nws-alert-detail{color:var(--text-secondary);line-height:1.4}
.nws-alert-expires{font-size:0.75em;color:var(--text-muted);margin-top:4px;font-family:var(--font-mono)}
.station-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.station-tile{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:10px;text-align:center;cursor:pointer;-webkit-user-select:none;user-select:none;transition:border-color 0.15s}
.station-tile:active{border-color:var(--accent-blue)}
.station-val{font-size:1.05em;font-weight:700}
.station-label{font-size:0.6em;text-transform:uppercase;color:var(--text-muted);letter-spacing:0.04em;margin-top:3px}
.station-sub{font-size:0.65em;color:var(--text-secondary)}
.metar-raw{font-family:var(--font-mono);font-size:0.7em;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);padding:10px;color:var(--accent-cyan);line-height:1.6;word-break:break-all;margin-top:10px}
.flt-cat{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:0.7em;font-weight:700;letter-spacing:0.06em}
.flt-vfr{background:rgba(34,197,94,0.15);color:#22c55e}
.flt-mvfr{background:rgba(59,130,246,0.15);color:#3b82f6}
.flt-ifr{background:rgba(239,68,68,0.15);color:#ef4444}
.flt-lifr{background:rgba(236,72,153,0.15);color:#ec4899}
.wind-compass{width:100px;height:100px;border-radius:50%;border:2px solid var(--border-subtle);position:relative;margin:0 auto 10px;background:var(--bg-surface)}
.wind-arrow{position:absolute;top:50%;left:50%;width:4px;height:40px;margin-left:-2px;margin-top:-35px;background:linear-gradient(180deg,var(--accent-cyan),transparent);transform-origin:50% 35px;border-radius:2px;transition:transform 0.5s ease}
.wind-arrow::after{content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:10px solid var(--accent-cyan)}
.compass-label{position:absolute;font-size:0.55em;font-weight:700;color:var(--text-muted)}
.compass-n{top:4px;left:50%;transform:translateX(-50%);color:var(--accent-cyan)}
.compass-s{bottom:4px;left:50%;transform:translateX(-50%)}
.compass-e{right:6px;top:50%;transform:translateY(-50%)}
.compass-w{left:6px;top:50%;transform:translateY(-50%)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-height);background:rgba(10,14,26,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border-subtle);display:flex;justify-content:center;align-items:center;gap:2px;z-index:200;padding:0 8px}
.nav-item{flex:1;max-width:80px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;border-radius:var(--radius-sm);cursor:pointer;transition:all 0.15s;border:none;background:transparent;color:var(--text-muted);font-family:var(--font-body)}
.nav-item:hover{color:var(--text-secondary)}
.nav-item.active{color:var(--accent-blue)}
.nav-item .nav-icon{font-size:1.3em}
.nav-item .nav-label{font-size:0.6em;font-weight:600;text-transform:uppercase;letter-spacing:0.04em}
.skeleton{background:linear-gradient(90deg,var(--bg-surface) 25%,var(--bg-elevated) 50%,var(--bg-surface) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius-sm)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-line{height:16px;margin-bottom:8px}
.toast-container{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:10px 18px;font-size:0.8em;color:var(--text-primary);box-shadow:var(--shadow-md);opacity:0;transform:translateY(-10px);animation:toast-in 0.25s ease forwards;pointer-events:auto}
@keyframes toast-in{to{opacity:1;transform:translateY(0)}}
.toast.out{animation:toast-out 0.2s ease forwards}
@keyframes toast-out{to{opacity:0;transform:translateY(-10px)}}
.section-page{display:none}
.section-page.visible{display:block}
.empty-state{text-align:center;padding:30px 20px;color:var(--text-muted)}
.empty-state .empty-icon{font-size:2.5em;margin-bottom:10px}
.empty-state p{font-size:0.85em;line-height:1.5}
.powered-by{text-align:center;padding:20px;font-size:0.65em;color:var(--text-muted)}
.powered-by a{color:var(--accent-blue);text-decoration:none}
.hourly-chart{display:flex;align-items:flex-end;gap:2px;height:60px;margin-top:8px}
.hourly-bar{flex:1;border-radius:3px 3px 0 0;min-height:2px;position:relative;cursor:pointer}
.hourly-bar:hover{opacity:0.8}
.hourly-bar .bar-tip{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:0.55em;color:var(--text-secondary);white-space:nowrap;opacity:0;transition:opacity 0.15s;pointer-events:none}
.hourly-bar:hover .bar-tip{opacity:1}
canvas.offscreen{display:none}
.welcome-screen{text-align:center;padding:40px 20px}
.welcome-screen h2{font-size:1.3em;font-weight:700;margin-bottom:8px;color:var(--text-primary)}
.welcome-screen p{font-size:0.85em;color:var(--text-secondary);line-height:1.5;margin-bottom:16px}
.welcome-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border:none;border-radius:var(--radius-md);background:linear-gradient(135deg,var(--accent-blue),#2563eb);color:white;font-size:0.9em;font-weight:600;font-family:var(--font-body);cursor:pointer;margin:6px;transition:all 0.15s}
.welcome-btn:hover{filter:brightness(1.1)}
.welcome-btn:active{transform:scale(0.96)}
.welcome-btn.secondary{background:var(--bg-elevated);border:1px solid var(--border-subtle)}
.confirm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:9998;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.confirm-box{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:24px;max-width:340px;width:100%;text-align:center;box-shadow:var(--shadow-md)}
.confirm-box h3{font-size:1.1em;margin-bottom:8px}
.confirm-box p{font-size:0.85em;color:var(--text-secondary);margin-bottom:16px;line-height:1.4}
.confirm-btns{display:flex;gap:10px;justify-content:center}
.confirm-btns button{padding:10px 20px;border-radius:var(--radius-md);border:none;font-size:0.85em;font-weight:600;cursor:pointer;font-family:var(--font-body)}
.confirm-allow{background:var(--accent-blue);color:white}
.confirm-deny{background:var(--bg-elevated);color:var(--text-secondary);border:1px solid var(--border-subtle)}
</style>
</head>
<body>
<div class="toast-container" id="toast-container"></div>
<canvas id="radarCanvas" class="offscreen" width="256" height="256"></canvas>

<header class="app-header">
  <h1>⚡ StormTracker</h1>
  <div class="version">v1.52 &middot; Real-time Storm Detection</div>
  <div class="header-status">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Initializing...</span>
  </div>
</header>

<div class="container">
  <div class="location-bar">
    <span style="font-size:1.1em">📍</span>
    <input type="text" id="location-input" placeholder="Search city, ZIP, or address..." autocomplete="off">
    <button class="btn-icon" id="btn-gps" title="Use GPS">🛰️</button>
    <button class="btn-icon" id="btn-search" title="Search">🔍</button>
  </div>
  <div id="page-weather" class="section-page visible"></div>
  <div id="page-radar" class="section-page"></div>
  <div id="page-storms" class="section-page"></div>
  <div id="page-station" class="section-page"></div>
  <div id="page-alerts" class="section-page"></div>
</div>

<div class="powered-by">
  100% free &middot; No API keys &middot; No account required<br>
  <a href="https://open-meteo.com" target="_blank">Open-Meteo</a> &middot;
  <a href="https://www.rainviewer.com" target="_blank">RainViewer</a> &middot;
  <a href="https://www.weather.gov" target="_blank">NWS</a> &middot;
  <a href="https://aviationweather.gov" target="_blank">AWC</a>
</div>

<nav class="bottom-nav">
  <button class="nav-item active" data-page="weather"><span class="nav-icon">🌤️</span><span class="nav-label">Weather</span></button>
  <button class="nav-item" data-page="radar"><span class="nav-icon">📡</span><span class="nav-label">Radar</span></button>
  <button class="nav-item" data-page="storms"><span class="nav-icon">🌪️</span><span class="nav-label">Storms</span></button>
  <button class="nav-item" data-page="station"><span class="nav-icon">🏢</span><span class="nav-label">Station</span></button>
  <button class="nav-item" data-page="alerts"><span class="nav-icon">⚠️</span><span class="nav-label">Alerts</span></button>
</nav>

<script>
const S = {
  lat:null, lon:null, locName:'',
  tempUnit:0, windUnit:0, presUnit:0, visUnit:0, precipUnit:0,
  weather:null, forecast:null,
  storms:[], stormMarkers:[],
  alerts:[], station:null, stationId:null,
  map:null, radarLayer:null, radarFrames:[], radarIdx:0,
  radarPlaying:false, radarTimer:null, scanRadius:80, nexradOn:false, nexradLayer:null,
  activePage:'weather', nearbyStations:[],
};
const TEMP_UNITS = ['°F','°C'];
const WIND_UNITS = ['mph','kts','km/h','m/s'];
const PRES_UNITS = ['inHg','mb','mmHg','kPa'];
const VIS_UNITS = ['mi','km'];
const PRECIP_UNITS = ['in','mm','cm'];

function toast(msg){const c=document.getElementById('toast-container');const el=document.createElement('div');el.className='toast';el.textContent=msg;c.appendChild(el);setTimeout(()=>{el.classList.add('out');setTimeout(()=>el.remove(),250)},3000)}
function showSkel(el,n){el.innerHTML=Array.from({length:n},()=>`<div class="skeleton skel-line" style="width:${60+Math.random()*40}%"></div>`).join('')}
function degToDir(d){const dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];return dirs[Math.round(d/22.5)%16]}

function cToF(c){return(c*9/5+32).toFixed(1)}
function fmtTemp(c){return S.tempUnit===0?(cToF(c)+' °F'):(c.toFixed(1)+' °C')}
function fmtTempShort(c){return S.tempUnit===0?(cToF(c)+'°'):(c.toFixed(1)+'°')}

function kmhTo(kmh,unit){
  if(unit===0) return (kmh/1.609).toFixed(1);
  if(unit===1) return (kmh/1.852).toFixed(1);
  if(unit===2) return kmh.toFixed(1);
  return (kmh/3.6).toFixed(1);
}
function fmtWind(kmh){return kmhTo(kmh,S.windUnit)+' '+WIND_UNITS[S.windUnit]}
function ktsTo(kts,unit){
  if(unit===0) return (kts*1.151).toFixed(0);
  if(unit===1) return kts.toFixed(0);
  if(unit===2) return (kts*1.852).toFixed(0);
  return (kts*0.5144).toFixed(1);
}
function fmtWindKts(kts){return ktsTo(kts,S.windUnit)+' '+WIND_UNITS[S.windUnit]}

function fmtPres(mb){
  if(S.presUnit===0) return (mb*0.02953).toFixed(2)+' inHg';
  if(S.presUnit===1) return mb.toFixed(0)+' mb';
  if(S.presUnit===2) return (mb*0.75006).toFixed(0)+' mmHg';
  return (mb*0.1).toFixed(1)+' kPa';
}

function fmtVis(sm){
  if(S.visUnit===0) return sm.toFixed(1)+' mi';
  return (sm*1.609).toFixed(1)+' km';
}

function fmtPrecip(mm){
  if(S.precipUnit===0) return (mm/25.4).toFixed(2)+' in';
  if(S.precipUnit===1) return mm.toFixed(1)+' mm';
  return (mm/10).toFixed(2)+' cm';
}

function cycleUnit(key){
  const maxes={tempUnit:2,windUnit:4,presUnit:4,visUnit:2,precipUnit:3};
  S[key]=(S[key]+1)%maxes[key];
  try{localStorage.setItem('st_units',JSON.stringify({t:S.tempUnit,w:S.windUnit,p:S.presUnit,v:S.visUnit,pr:S.precipUnit}))}catch(e){}
  reRenderActive();
}
function loadUnits(){
  try{const u=JSON.parse(localStorage.getItem('st_units'));if(u){S.tempUnit=u.t||0;S.windUnit=u.w||0;S.presUnit=u.p||0;S.visUnit=u.v||0;S.precipUnit=u.pr||0}}catch(e){}
}

function reRenderActive(){
  if(S.activePage==='weather'&&S.forecast) renderWeather(S.forecast);
  if(S.activePage==='station'&&S.station) renderStation();
  if(S.activePage==='storms') renderStorms();
}

function haversine(lat1,lon1,lat2,lon2){const R=3959,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))}
function bearingDeg(lat1,lon1,lat2,lon2){const dLon=(lon2-lon1)*Math.PI/180;const y=Math.sin(dLon)*Math.cos(lat2*Math.PI/180);const x=Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180)-Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos(dLon);return((Math.atan2(y,x)*180/Math.PI)+360)%360}

function wmoIcon(code,isDay){const m={0:isDay?'☀️':'🌙',1:isDay?'🌤️':'🌙',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',56:'🌧️',57:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',66:'🧊',67:'🧊',71:'🌨️',73:'🌨️',75:'❄️',77:'🌨️',80:'🌦️',81:'🌧️',82:'🌧️',85:'🌨️',86:'❄️',95:'⛈️',96:'⛈️',99:'⛈️'};return m[code]||'🌡️'}
function wmoDesc(code){const m={0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Fog',48:'Rime fog',51:'Light drizzle',53:'Moderate drizzle',55:'Dense drizzle',56:'Freezing drizzle',57:'Dense freezing drizzle',61:'Slight rain',63:'Moderate rain',65:'Heavy rain',66:'Freezing rain',67:'Heavy freezing rain',71:'Slight snow',73:'Moderate snow',75:'Heavy snow',77:'Snow grains',80:'Rain showers',81:'Mod rain showers',82:'Violent rain showers',85:'Snow showers',86:'Heavy snow showers',95:'Thunderstorm',96:'T-storm w/ hail',99:'T-storm w/ heavy hail'};return m[code]||'Unknown'}

function stormCat(dbz){
  if(dbz>=55)return{label:'Extreme',cls:'extreme',color:'var(--accent-purple)'};
  if(dbz>=45)return{label:'Intense',cls:'intense',color:'var(--accent-red)'};
  if(dbz>=35)return{label:'Heavy',cls:'heavy',color:'var(--accent-orange)'};
  if(dbz>=20)return{label:'Moderate',cls:'moderate',color:'var(--accent-yellow)'};
  return{label:'Light',cls:'light',color:'var(--accent-green)'};
}
function calcDewC(tc,rh){const a=17.27,b=237.7,g=(a*tc)/(b+tc)+Math.log(rh/100);return(b*g)/(a-g)}

function pixelToDbz(r,g,b,a){if(a<10)return 0;return(r&127)-32}
function nexradToDbz(r,g,b,a){
  if(a<30)return 0;
  const NX=[
    [0,0,0,0],[100,100,100,5],[4,233,231,10],[1,159,244,15],[3,0,244,20],
    [2,253,2,25],[1,197,1,30],[0,142,0,35],[253,248,2,40],[229,188,0,45],
    [253,149,0,50],[253,0,0,55],[212,0,0,60],[188,0,0,65],[248,0,253,70],[152,84,198,75]
  ];
  let best=0,bestD=1e9;
  for(const [nr,ng,nb,dbz] of NX){
    const d=(r-nr)**2+(g-ng)**2+(b-nb)**2;
    if(d<bestD){bestD=d;best=dbz}
  }
  return bestD<6000?best:0;
}

function showLocationConfirm(){

  const overlay=document.createElement('div');
  overlay.className='confirm-overlay';
  overlay.innerHTML=`<div class="confirm-box">
    <h3>📍 Share Your Location?</h3>
    <p>StormTracker needs your location to show local weather, radar, and storm data. Your position is only used in your browser and never sent to any server.</p>
    <div class="confirm-btns">
      <button class="confirm-deny" id="loc-deny">No Thanks</button>
      <button class="confirm-allow" id="loc-allow">Allow Location</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('loc-deny').addEventListener('click',()=>{overlay.remove();toast('You can search for a location instead')});
  document.getElementById('loc-allow').addEventListener('click',()=>{
    overlay.remove();

    navigator.geolocation.getCurrentPosition(

      err=>{
        const msgs={1:'Location permission denied',2:'Location unavailable — your browser may block GPS',3:'Location request timed out'};
        toast((msgs[err.code]||'Could not get location')+' — try searching instead');
      },
      {enableHighAccuracy:false,timeout:15000,maximumAge:60000}

async function searchLoc(){
  const q=document.getElementById('location-input').value.trim();
  if(!q)return;
  toast('Searching...');
  try{
    const res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1`);
    const data=await res.json();
    if(data.length){setLoc(parseFloat(data[0].lat),parseFloat(data[0].lon),data[0].display_name.split(',').slice(0,2).join(',').trim())}
    else toast('Location not found');
  }catch(e){toast('Search failed')}
}

async function reverseGeo(lat,lon){
  try{
    const res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
    const data=await res.json();const addr=data.address||{};
    const name=addr.city||addr.town||addr.village||addr.county||'';
    setLoc(lat,lon,name?`${name}, ${addr.state||''}`:`${lat.toFixed(4)}, ${lon.toFixed(4)}`);
  }catch(e){setLoc(lat,lon)}
}

function setLoc(lat,lon,name){
  S.lat=lat;S.lon=lon;
  S.locName=name||`${lat.toFixed(4)}, ${lon.toFixed(4)}`;
  document.getElementById('location-input').value=S.locName;
  document.getElementById('status-dot').classList.add('live');
  document.getElementById('status-text').textContent='Live · '+S.locName;
  S.station=null;S.stationId=null;S.storms=[];
  try{localStorage.setItem('st_loc',JSON.stringify({lat,lon,name:S.locName}))}catch(e){}
  fetchWeather();
  fetchAlerts();
  scanRadarForStorms();
}

async function fetchWeather(){

      +`&hourly=temperature_2m,precipitation_probability,precipitation,weather_code,wind_speed_10m,is_day`
      +`&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,sunrise,sunset,wind_speed_10m_max`
      +`&temperature_unit=celsius&wind_speed_unit=kmh&precipitation_unit=mm&timezone=auto&forecast_days=7`;

function renderWeather(data){

  el.innerHTML=`
    <div class="weather-hero">
      <div style="font-size:2.5em;margin-bottom:4px">${icon}</div>
      <div class="hero-temp" onclick="cycleUnit('tempUnit')">${fmtTempShort(tempC)}</div>

      <div class="hero-location">📍 ${S.locName}</div>
      <div style="font-size:0.55em;color:var(--accent-cyan);margin-top:4px;opacity:0.7">Tap any value to cycle units</div>
      <div class="hero-detail-row">
        <div class="hero-detail" onclick="cycleUnit('tempUnit')" style="cursor:pointer"><div class="hero-detail-label">Feels Like</div><div class="hero-detail-value">${fmtTemp(feelsC)}</div></div>
        <div class="hero-detail"><div class="hero-detail-label">Humidity</div><div class="hero-detail-value">${c.relative_humidity_2m}%</div></div>
        <div class="hero-detail" onclick="cycleUnit('presUnit')" style="cursor:pointer"><div class="hero-detail-label">Pressure</div><div class="hero-detail-value">${fmtPres(c.pressure_msl)}</div></div>
        <div class="hero-detail" onclick="cycleUnit('precipUnit')" style="cursor:pointer"><div class="hero-detail-label">Precip</div><div class="hero-detail-value">${fmtPrecip(c.precipitation||0)}</div></div>
      </div>
    </div>
    <div class="weather-grid">
      <div class="weather-tile" onclick="cycleUnit('windUnit')"><div class="tile-icon">💨</div><div class="tile-label">Wind</div><div class="tile-value">${fmtWind(c.wind_speed_10m)}</div><div class="tile-sub">${degToDir(c.wind_direction_10m)}${c.wind_gusts_10m?' · G'+fmtWind(c.wind_gusts_10m):''}</div><div class="tile-tap">tap to change</div></div>
      <div class="weather-tile"><div class="tile-icon">☁️</div><div class="tile-label">Clouds</div><div class="tile-value">${c.cloud_cover}%</div><div class="tile-sub">Coverage</div></div>
      <div class="weather-tile" onclick="cycleUnit('precipUnit')"><div class="tile-icon">🌧️</div><div class="tile-label">Rain</div><div class="tile-value">${fmtPrecip(c.rain||0)}</div><div class="tile-sub">${(c.snowfall||0)>0?'Snow: '+c.snowfall+'cm':''}</div><div class="tile-tap">tap to change</div></div>
      <div class="weather-tile" onclick="cycleUnit('tempUnit')"><div class="tile-icon">🌡️</div><div class="tile-label">Dew Point</div><div class="tile-value">${fmtTemp(dewC)}</div><div class="tile-sub">Moisture</div><div class="tile-tap">tap to change</div></div>
    </div>
    ${renderHourlyPrecip(hourly)}
    ${renderDailyForecast(daily)}`;
}

function renderHourlyPrecip(h){
  if(!h||!h.precipitation)return'';
  const now=new Date(),si=h.time.findIndex(t=>new Date(t)>=now);
  const precips=h.precipitation.slice(si,si+24);
  const maxP=Math.max(...precips,1);
  return`<div class="card"><div class="card-title"><span class="icon">🌧️</span> 24h Precipitation</div>
    <div class="hourly-chart">${precips.map((p,i)=>{
      const ht=Math.max(2,(p/maxP)*55);
      const color=p>=5?'var(--accent-red)':p>=2?'var(--accent-orange)':p>=0.5?'var(--accent-blue)':'var(--bg-elevated)';
      return`<div class="hourly-bar" style="height:${ht}px;background:${color}"><div class="bar-tip">${fmtPrecip(p)}</div></div>`;
    }).join('')}</div>
    <div style="display:flex;justify-content:space-between;font-size:0.55em;color:var(--text-muted);margin-top:4px"><span>Now</span><span>+6h</span><span>+12h</span><span>+18h</span><span>+24h</span></div></div>`;
}

function renderDailyForecast(d){
  if(!d||!d.time)return'';
  return`<div class="card"><div class="card-title"><span class="icon">📊</span> 7-Day Forecast</div>
    <div class="forecast-scroll">${d.time.map((t,i)=>{
      const dt=new Date(t+'T12:00'),day=i===0?'Today':dt.toLocaleDateString('en',{weekday:'short'});
      const hi=fmtTempShort(d.temperature_2m_max[i]),lo=fmtTempShort(d.temperature_2m_min[i]);
      const rain=d.precipitation_probability_max?d.precipitation_probability_max[i]:0;
      return`<div class="forecast-item"><div class="forecast-time">${day}</div><div class="forecast-icon">${wmoIcon(d.weather_code[i],true)}</div><div class="forecast-temp" style="font-weight:700">${hi}</div><div style="font-size:0.7em;color:var(--text-muted)">${lo}</div>${rain>20?`<div style="font-size:0.55em;color:var(--accent-blue);margin-top:2px">💧${rain}%</div>`:''}</div>`;
    }).join('')}</div></div>`;
}

async function scanRadarForView(){
  if(!S.map)return;
  const bounds=S.map.getBounds();
  toast('Scanning visible area...');
  try{
    const rv=await fetch('https://api.rainviewer.com/public/weather-maps.json').then(r=>r.json());
    const past=rv.radar?.past||[];
    if(!past.length){toast('No radar frames available');S.storms=[];renderStorms();return}
    const tilePath=past[past.length-1].path;
    const zoom=6;
    const minTX=lonToTileX(bounds.getWest(),zoom);
    const maxTX=lonToTileX(bounds.getEast(),zoom);
    const minTY=latToTileY(bounds.getNorth(),zoom);
    const maxTY=latToTileY(bounds.getSouth(),zoom);
    const tileCoords=[];
    for(let tx=minTX;tx<=maxTX;tx++){for(let ty=minTY;ty<=maxTY;ty++){tileCoords.push([tx,ty])}}
    let nxGrid={};
    try{nxGrid=await getNexradGrid(tileCoords,zoom)}catch(e){console.warn('NEXRAD grid failed:',e)}
    const rawPoints=[];
    const canvas=document.getElementById('radarCanvas');
    const ctx=canvas.getContext('2d',{willReadFrequently:true});
    let tilesLoaded=0,tilesError=0;
    for(const [tx,ty] of tileCoords){
      try{
        const img=await loadImage(`https://tilecache.rainviewer.com${tilePath}/256/${zoom}/${tx}/${ty}/2/1_1.png`);
        ctx.clearRect(0,0,256,256);ctx.drawImage(img,0,0);
        tilesLoaded++;
        const step=8;
        for(let px=0;px<256;px+=step){
          for(let py=0;py<256;py+=step){
            const pixel=ctx.getImageData(px,py,1,1).data;
            const rvDbz=pixelToDbz(pixel[0],pixel[1],pixel[2],pixel[3]);
            const dbz=mergeDbz(rvDbz,nxGrid,tx,ty,px,py);
            if(dbz>=15){
              const ptLat=tileYToLat(ty+py/256,zoom);
              const ptLon=tileXToLon(tx+px/256,zoom);
              if(bounds.contains([ptLat,ptLon])){
                const dist=haversine(S.lat,S.lon,ptLat,ptLon);
                rawPoints.push({lat:ptLat,lng:ptLon,dbz,dist});
              }
            }
          }
        }
      }catch(e){tilesError++;console.warn('View tile error:',tx,ty,e.message||e)}
    }
    toast(`Tiles: ${tilesLoaded}/${tileCoords.length} loaded, ${rawPoints.length} pts`);
    console.log('ViewScan: '+tilesLoaded+' tiles, '+tilesError+' errors, '+rawPoints.length+' raw points');
    const clusters=clusterPoints(rawPoints,0.15);
    S.storms=clusters.map(cl=>{
      const maxDbz=Math.max(...cl.map(p=>p.dbz));
      const avgLat=cl.reduce((s,p)=>s+p.lat,0)/cl.length;
      const avgLng=cl.reduce((s,p)=>s+p.lng,0)/cl.length;
      const dist=haversine(S.lat,S.lon,avgLat,avgLng);
      const bear=bearingDeg(S.lat,S.lon,avgLat,avgLng);
      return{lat:avgLat,lng:avgLng,dbz:maxDbz,distance:dist,bearing:bear,pixels:cl.length};
    }).sort((a,b)=>a.distance-b.distance);
    const src=S.nexradOn&&Object.keys(nxGrid).length?' (RV+NX)':'';
    toast(`${S.storms.length} cell${S.storms.length!==1?'s':''} found in view${src}`);
    if(tilesError>0&&tilesLoaded===0)toast('All radar tiles failed to load');
    renderStorms();
    if(S.map)plotStormMarkers(S.map);
  }catch(e){toast('View scan failed: '+e.message);console.error('ViewScan error:',e)}
}

function plotStormMarkers(map){
  S.stormMarkers.forEach(m=>map.removeLayer(m));S.stormMarkers=[];
  S.storms.forEach(storm=>{
    const cat=stormCat(storm.dbz);
    const color=storm.dbz>=45?'#ef4444':storm.dbz>=35?'#f97316':storm.dbz>=20?'#eab308':'#22c55e';
    const marker=L.circleMarker([storm.lat,storm.lng],{radius:Math.max(6,storm.dbz/5),color:color,fillColor:color,fillOpacity:0.6,weight:2}).addTo(map);
    marker.bindPopup(`<b>${cat.label}</b><br>${storm.dbz} dBZ<br>${storm.distance.toFixed(1)} mi ${degToDir(storm.bearing)}`);
    S.stormMarkers.push(marker);
    if(storm.dbz>=40){
      const lightning=L.marker([storm.lat,storm.lng],{icon:L.divIcon({className:'',html:`<div style="font-size:18px;text-shadow:0 0 6px #fff">⚡</div>`,iconSize:[20,20],iconAnchor:[10,10]})}).addTo(map);
      S.stormMarkers.push(lightning);
    }
  });
}

// ==========================================
// RADAR-BASED STORM DETECTION
// RainViewer scheme 2 primary + optional NEXRAD blend
// ==========================================
async function getNexradGrid(tileCoords,zoom){
  const grid={};
  if(!S.nexradOn)return grid;
  const c2=document.createElement('canvas');c2.width=256;c2.height=256;
  const cx2=c2.getContext('2d',{willReadFrequently:true});
  const step=8;
  for(const [tx,ty] of tileCoords){
    try{
      const img=await loadImage(`https://mesonet.agron.iastate.edu/cache/tile.py/1.0.0/nexrad-n0q-900913/${zoom}/${tx}/${ty}.png`);
      cx2.clearRect(0,0,256,256);cx2.drawImage(img,0,0);
      const m={};
      for(let px=0;px<256;px+=step){for(let py=0;py<256;py+=step){
        const p=cx2.getImageData(px,py,1,1).data;
        const d=nexradToDbz(p[0],p[1],p[2],p[3]);
        if(d>0)m[px+','+py]=d;
      }}
      if(Object.keys(m).length)grid[tx+','+ty]=m;
    }catch(e){}
  }
  return grid;
}

function mergeDbz(rvDbz,nxGrid,tx,ty,px,py){
  const nxDbz=(nxGrid[tx+','+ty]||{})[px+','+py]||0;
  if(rvDbz>0&&nxDbz>0)return Math.round((rvDbz+nxDbz)/2);
  return rvDbz||nxDbz;
}

async function scanRadarForStorms(){
  if(!S.lat)return;
  toast('Scanning radar for storm cells...');
  try{
    const rv=await fetch('https://api.rainviewer.com/public/weather-maps.json').then(r=>r.json());
    const past=rv.radar?.past||[];
    if(!past.length){toast('No radar frames available');S.storms=[];renderStorms();return}
    const tilePath=past[past.length-1].path;
    const zoom=6;
    const rawPoints=[];
    const centerTileX=lonToTileX(S.lon,zoom);
    const centerTileY=latToTileY(S.lat,zoom);
    const scanTileRadius=2;
    const tileCoords=[];
    for(let dx=-scanTileRadius;dx<=scanTileRadius;dx++){
      for(let dy=-scanTileRadius;dy<=scanTileRadius;dy++){
        tileCoords.push([centerTileX+dx,centerTileY+dy]);
      }
    }
    let nxGrid={};
    try{nxGrid=await getNexradGrid(tileCoords,zoom)}catch(e){console.warn('NEXRAD grid failed:',e)}
    const canvas=document.getElementById('radarCanvas');
    const ctx=canvas.getContext('2d',{willReadFrequently:true});
    let tilesLoaded=0,tilesError=0;

    let firstTileSampled=false;
    for(const [tx,ty] of tileCoords){
      try{
        const url=`https://tilecache.rainviewer.com${tilePath}/256/${zoom}/${tx}/${ty}/2/1_1.png`;
        const img=await loadImage(url);
        ctx.clearRect(0,0,256,256);ctx.drawImage(img,0,0);
        tilesLoaded++;
        if(!firstTileSampled){
          firstTileSampled=true;
          const samp=ctx.getImageData(128,128,1,1).data;
          const full=ctx.getImageData(0,0,256,256).data;
          let nonZero=0;for(let i=0;i<full.length;i+=4){if(full[i+3]>0)nonZero++}
          toast(`Tile ${tx},${ty}: px=(${samp[0]},${samp[1]},${samp[2]},${samp[3]}) nz=${nonZero}`);
        }
        const step=8;
        for(let px=0;px<256;px+=step){
          for(let py=0;py<256;py+=step){
            const pixel=ctx.getImageData(px,py,1,1).data;
            const rvDbz=pixelToDbz(pixel[0],pixel[1],pixel[2],pixel[3]);
            const dbz=mergeDbz(rvDbz,nxGrid,tx,ty,px,py);
            if(dbz>=15){
              const ptLat=tileYToLat(ty+py/256,zoom);
              const ptLon=tileXToLon(tx+px/256,zoom);
              const dist=haversine(S.lat,S.lon,ptLat,ptLon);
              if(dist<=S.scanRadius)rawPoints.push({lat:ptLat,lng:ptLon,dbz,dist});
            }
          }
        }
      }catch(e){tilesError++;console.warn('Tile load error:',tx,ty,e.message||e)}
    }
    toast(`Tiles: ${tilesLoaded}/${tileCoords.length} loaded, ${rawPoints.length} pts`);
    console.log('Scan: '+tilesLoaded+' tiles loaded, '+tilesError+' errors, '+rawPoints.length+' raw points');

    const clusters=clusterPoints(rawPoints,0.15);
    S.storms=clusters.map(cl=>{
      const maxDbz=Math.max(...cl.map(p=>p.dbz));
      const avgLat=cl.reduce((s,p)=>s+p.lat,0)/cl.length;
      const avgLng=cl.reduce((s,p)=>s+p.lng,0)/cl.length;
      const dist=haversine(S.lat,S.lon,avgLat,avgLng);
      const bear=bearingDeg(S.lat,S.lon,avgLat,avgLng);
      return{lat:avgLat,lng:avgLng,dbz:maxDbz,distance:dist,bearing:bear,pixels:cl.length};
    }).sort((a,b)=>a.distance-b.distance);

    const src=S.nexradOn&&Object.keys(nxGrid).length?' (RV+NX)':'';
    toast(`${S.storms.length} cell${S.storms.length!==1?'s':''} found${src}`);
    if(tilesError>0)toast(`${tilesError} tile errors`);
    renderStorms();
    if(S.map)plotStormMarkers(S.map);
  }catch(e){toast('Radar scan failed: '+e.message);console.error('Scan error:',e)}
}

function loadImage(url){
  return fetch(url).then(r=>{
    if(!r.ok)throw new Error('HTTP '+r.status);
    return r.blob();
  }).then(blob=>{
    if(typeof createImageBitmap==='function'){
      return createImageBitmap(blob,{premultiplyAlpha:'none'});
    }
    return new Promise((resolve,reject)=>{
      const img=new Image();
      img.crossOrigin='anonymous';
      img.onload=()=>resolve(img);
      img.onerror=reject;
      img.src=URL.createObjectURL(blob);
    });
  });
}
function lonToTileX(lon,z){return Math.floor((lon+180)/360*Math.pow(2,z))}
function latToTileY(lat,z){const r=lat*Math.PI/180;return Math.floor((1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*Math.pow(2,z))}
function tileXToLon(x,z){return x/Math.pow(2,z)*360-180}
function tileYToLat(y,z){const n=Math.PI-2*Math.PI*y/Math.pow(2,z);return 180/Math.PI*Math.atan(0.5*(Math.exp(n)-Math.exp(-n)))}

function clusterPoints(points,threshold){
  const clusters=[];const used=new Set();
  for(let i=0;i<points.length;i++){
    if(used.has(i))continue;
    const cluster=[points[i]];used.add(i);
    for(let j=i+1;j<points.length;j++){
      if(used.has(j))continue;
      const d=Math.sqrt((points[i].lat-points[j].lat)**2+(points[i].lng-points[j].lng)**2);
      if(d<threshold){cluster.push(points[j]);used.add(j)}
    }
    if(cluster.length>=2)clusters.push(cluster);
  }
  return clusters;
}

// ==========================================
// STATION (NWS API — CORS-friendly)
// Step 1: /points/{lat},{lon} → get observationStations URL
// Step 2: Follow that URL → list of nearby stations
// Step 3: /stations/{ICAO}/observations/latest → obs data
// NWS API has Access-Control-Allow-Origin: * (works from browser)
// AWC API does NOT have CORS headers (blocked in browser)
// ==========================================
const NWS_HDR={headers:{'User-Agent':'StormTracker/1.50','Accept':'application/geo+json'}};

async function fetchStation(){
  const el=document.getElementById('page-station');showSkel(el,5);
  try{
    const ptRes=await fetch(`https://api.weather.gov/points/${S.lat.toFixed(4)},${S.lon.toFixed(4)}`,NWS_HDR);
    if(!ptRes.ok)throw new Error('NWS points returned '+ptRes.status);
    const ptData=await ptRes.json();
    const stationsUrl=ptData.properties?.observationStations;
    if(!stationsUrl)throw new Error('No observation stations URL');
    const stRes=await fetch(stationsUrl,NWS_HDR);
    if(!stRes.ok)throw new Error('NWS stations returned '+stRes.status);
    const stData=await stRes.json();
    const features=stData.features||stData.observationStations||[];
    if(!features.length){el.innerHTML=`<div class="empty-state"><div class="empty-icon">📡</div><p>No weather stations found nearby.</p></div>`;return}
    S.nearbyStations=features.slice(0,10).map(f=>({
      icao:f.properties.stationIdentifier,
      name:f.properties.name||'',
      lat:f.geometry.coordinates[1],
      lon:f.geometry.coordinates[0],
      dist:haversine(S.lat,S.lon,f.geometry.coordinates[1],f.geometry.coordinates[0]),
    })).sort((a,b)=>a.dist-b.dist);
    await loadStationObs(S.nearbyStations[0].icao);
  }catch(e){
    console.error('Station fetch error:',e);
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">📡</div><p>Station data unavailable.<br><span style="font-size:0.8em;color:var(--text-muted)">${e.message||''}</span></p></div>`;
  }
}

async function loadStationObs(icao){
  const el=document.getElementById('page-station');
  S.stationId=icao;
  try{
    const obsRes=await fetch(`https://api.weather.gov/stations/${icao}/observations/latest`,NWS_HDR);
    if(!obsRes.ok)throw new Error('Obs returned '+obsRes.status);
    const obsData=await obsRes.json();
    const p=obsData.properties||{};
    const stInfo=S.nearbyStations.find(s=>s.icao===icao);
    S.station={
      icao:icao,
      name:stInfo?.name||icao,
      lat:stInfo?.lat,
      lon:stInfo?.lon,
      temp:p.temperature?.value,
      dewp:p.dewpoint?.value,
      windKmh:p.windSpeed?.value,
      windDir:p.windDirection?.value,
      gustKmh:p.windGust?.value,
      visMeter:p.visibility?.value,
      presPa:p.barometricPressure?.value,
      rawMETAR:p.rawMessage||'',
      clouds:p.cloudLayers||[],
      obsTime:p.timestamp||'',
      wxString:p.textDescription||'',
    };
    renderStation();
  }catch(e){
    console.error('Obs fetch error:',e);
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">📡</div><p>Could not load observations for ${icao}.</p></div>`;
  }
}

function renderStation(){
  const el=document.getElementById('page-station');const s=S.station;if(!s)return;
  const tempC=s.temp;
  const dpC=s.dewp;
  const windKmh=s.windKmh;
  const gustKmh=s.gustKmh;
  const wDir=s.windDir;
  const visMeter=s.visMeter;
  const visSM=visMeter!=null?(visMeter/1609.34):null;
  const presPa=s.presPa;
  const presMb=presPa!=null?(presPa/100):null;
  const rh=(tempC!=null&&dpC!=null)?Math.round(100*Math.exp((17.27*dpC)/(237.7+dpC))/Math.exp((17.27*tempC)/(237.7+tempC))):null;
  const dist=(s.lat!=null&&s.lon!=null)?haversine(S.lat,S.lon,s.lat,s.lon).toFixed(1):'?';
  const raw=s.rawMETAR||'';
  const fltCat=getFltCat(visSM,s);
  const fltCls=fltCat==='VFR'?'vfr':fltCat==='MVFR'?'mvfr':fltCat==='IFR'?'ifr':'lifr';
  const stationName=s.name||S.stationId||'Weather Station';
  const obLabel=s.obsTime?new Date(s.obsTime).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';

  el.innerHTML=`
    <div class="card">
      <div class="card-title"><span class="icon">🏢</span> ${S.stationId} — ${stationName}</div>
      <div style="display:flex;justify-content:center;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
        <span class="flt-cat flt-${fltCls}">${fltCat==='VFR'?'●':'◉'} ${fltCat}</span>
        <span style="font-size:0.7em;color:var(--text-muted)">${dist} mi away</span>
        ${obLabel?`<span style="font-size:0.65em;color:var(--text-muted);font-family:var(--font-mono)">Updated: ${obLabel}</span>`:''}
      </div>
      <div class="wind-compass">
        <span class="compass-label compass-n">N</span><span class="compass-label compass-s">S</span>
        <span class="compass-label compass-e">E</span><span class="compass-label compass-w">W</span>
        <div class="wind-arrow" style="transform:rotate(${wDir||0}deg)"></div>
      </div>
      <div style="text-align:center;margin-bottom:14px;cursor:pointer" onclick="cycleUnit('windUnit')">
        <div style="font-size:1.2em;font-weight:700">${windKmh!=null?fmtWind(windKmh):'-'} ${wDir!=null?degToDir(wDir):''}</div>
        ${gustKmh?`<div style="font-size:0.8em;color:var(--accent-orange)">Gusts ${fmtWind(gustKmh)}</div>`:''}
        <div class="tile-tap">tap to change units</div>
      </div>
      <div class="station-grid">
        <div class="station-tile" onclick="cycleUnit('tempUnit')"><div class="station-val">${tempC!=null?fmtTemp(tempC):'--'}</div><div class="station-label">Temp</div><div class="tile-tap">tap</div></div>
        <div class="station-tile" onclick="cycleUnit('tempUnit')"><div class="station-val">${dpC!=null?fmtTemp(dpC):'--'}</div><div class="station-label">Dew Pt</div><div class="tile-tap">tap</div></div>
        <div class="station-tile"><div class="station-val">${rh!=null?rh:'--'}%</div><div class="station-label">Humidity</div></div>
        <div class="station-tile" onclick="cycleUnit('presUnit')"><div class="station-val">${presMb!=null?fmtPres(presMb):'--'}</div><div class="station-label">Baro</div><div class="tile-tap">tap</div></div>
        <div class="station-tile" onclick="cycleUnit('visUnit')"><div class="station-val">${visSM!=null?fmtVis(visSM):'--'}</div><div class="station-label">Vis</div><div class="tile-tap">tap</div></div>
        <div class="station-tile"><div class="station-val">${formatClouds(s)}</div><div class="station-label">Sky</div></div>
      </div>
      ${renderMetarDecoded(s)}
      ${raw?`<div class="metar-raw">${raw}</div>`:''}
    </div>
    ${renderNearbyStations()}`; 
}

function renderNearbyStations(){
  if(!S.nearbyStations||S.nearbyStations.length<=1)return'';
  return`<div class="card"><div class="card-title"><span class="icon">📡</span> Nearby Stations (${S.nearbyStations.length})</div>
    <div style="display:flex;flex-direction:column;gap:6px">
      ${S.nearbyStations.map(st=>{
        const active=st.icao===S.stationId;
        return`<div onclick="switchStation('${st.icao}')" style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:${active?'var(--bg-elevated)':'var(--bg-surface)'};border:1px solid ${active?'var(--accent-blue)':'var(--border-subtle)'};border-radius:var(--radius-sm);cursor:pointer;font-size:0.8em">
          <div><span style="font-weight:700;color:${active?'var(--accent-cyan)':'var(--text-primary)'}">${st.icao}</span> <span style="color:var(--text-muted)">${st.name||''}</span></div>
          <span style="color:var(--text-muted);font-size:0.85em">${st.dist.toFixed(1)} mi</span>
        </div>`;
      }).join('')}
    </div></div>`;
}

async function switchStation(icao){
  toast('Loading '+icao+'...');
  await loadStationObs(icao);
}

function formatClouds(s){
  if(!s.clouds||!s.clouds.length)return'CLR';
  return s.clouds.map(c=>{
    const cvg=c.amount||c.cover||'';
    const baseFt=c.base?.value!=null?Math.round(c.base.value*3.281):(c.base!=null?c.base:null);
    return cvg+(baseFt!=null?' '+baseFt+'ft':'');
  }).filter(Boolean).join(', ')||'CLR';
}

function renderMetarDecoded(s){
  const parts=[];
  if(s.temp!=null)parts.push(`<span>🌡️ Temp: ${fmtTemp(s.temp)}</span>`);
  if(s.dewp!=null)parts.push(`<span>💧 Dew: ${fmtTemp(s.dewp)}</span>`);
  if(s.windKmh!=null){
    let w=`💨 Wind: ${fmtWind(s.windKmh)} ${s.windDir!=null?degToDir(s.windDir):'VRB'}`;
    if(s.gustKmh!=null)w+=` G${fmtWind(s.gustKmh)}`;
    parts.push(`<span>${w}</span>`);
  }
  if(s.visMeter!=null)parts.push(`<span>👁️ Vis: ${fmtVis(s.visMeter/1609.34)}</span>`);
  if(s.presPa!=null)parts.push(`<span>📊 Baro: ${fmtPres(s.presPa/100)}</span>`);
  if(s.wxString)parts.push(`<span style="color:var(--accent-orange)">🌤️ ${s.wxString}</span>`);
  if(!parts.length)return'';
  return`<div style="display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:12px;font-size:0.7em;color:var(--text-secondary)">${parts.join('')}</div>`;
}

function getFltCat(visSM,s){
  let effCeil=99999;
  if(s.clouds&&s.clouds.length){
    for(const c of s.clouds){
      const amt=(c.amount||c.cover||'').toUpperCase();
      const baseFt=c.base?.value!=null?c.base.value*3.281:(typeof c.base==='number'?c.base:null);
      if((amt==='BKN'||amt==='OVC'||amt==='VV')&&baseFt!=null){effCeil=Math.min(effCeil,baseFt);break}
    }
  }
  if((visSM!=null&&visSM<1)||effCeil<500)return'LIFR';
  if((visSM!=null&&visSM<3)||effCeil<1000)return'IFR';
  if((visSM!=null&&visSM<=5)||effCeil<=3000)return'MVFR';
  return'VFR';
}

async function fetchAlerts(){

    const data=await res.json();S.alerts=data.features||[];renderAlerts();

function renderAlerts(){
  const el=document.getElementById('page-alerts');
  if(!S.lat){el.innerHTML=`<div class="empty-state"><div class="empty-icon">📍</div><p>Set your location to check alerts.</p></div>`;return}
  const alerts=S.alerts;
  if(!alerts.length){
    el.innerHTML=`<div class="alert-banner safe"><span class="alert-icon">✅</span><div class="alert-text"><span class="alert-title">No Active Alerts</span><br>No NWS warnings or watches for your area.</div></div>
      <div style="font-size:0.7em;color:var(--text-muted);text-align:center;padding:10px">NWS alerts cover US locations only.</div>`;
    return;
  }
  el.innerHTML=`<div class="card"><div class="card-title"><span class="icon">⚠️</span> NWS Alerts (${alerts.length})</div>
    ${alerts.map(a=>{
      const p=a.properties||{};const event=p.event||'Alert';const sev=(p.severity||'').toLowerCase();
      const cls=(sev==='extreme'||sev==='severe')?'':sev==='moderate'?'watch':'advisory';
      const desc=(p.description||'').substring(0,300);
      const expires=p.expires?new Date(p.expires).toLocaleString():'';
      const sevIcon=sev==='extreme'?'🔴':sev==='severe'?'🟠':sev==='moderate'?'🟡':'🔵';
      return`<div class="nws-alert ${cls}"><div class="nws-alert-title">${sevIcon} ${event}</div><div class="nws-alert-detail">${desc}${desc.length>=300?'...':''}</div>${expires?`<div class="nws-alert-expires">Expires: ${expires}</div>`:''}</div>`;
    }).join('')}</div>`;
}

      <h2>Welcome to StormTracker</h2>

      <button class="welcome-btn" onclick="showLocationConfirm()">🛰️ Use My Location</button>

        <strong>Features:</strong><br>
        Live weather &middot; Radar map &middot; Storm cell detection<br>
        METAR station data &middot; NWS alerts<br>
        Tappable unit cycling &middot; 7-day forecast

    </div>`;
}
