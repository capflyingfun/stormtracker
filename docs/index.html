<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>StormTracker v1.74b</title>
<meta name="description" content="Real-time storm detection with live radar, weather alerts, and storm tracking. No account required.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf@7/turf.min.js"></script>
<link rel="stylesheet" href="css/style.css?v=174b">
</head>
<body>
<div class="toast-container" id="toast-container"></div>
<canvas id="radarCanvas" class="offscreen" width="256" height="256"></canvas>

<header class="app-header">
  <div class="header-left">
    <span class="storm-count-badge" id="header-storm-count" onclick="switchPage('storms')"></span>
  </div>
  <div class="header-center">
    <h1>⚡ StormTracker <span style="font-size:0.45em;font-weight:500;color:var(--text-muted);vertical-align:middle">v1.74b</span></h1>
    <div class="header-status">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Initializing...</span>
    </div>
  </div>
  <div class="header-loc-btn" id="btn-lang" onclick="toggleLangMenu()" title="Language">🌐</div>
  <div class="header-loc-btn" id="btn-loc-open" onclick="toggleLocOverlay(true)" title="Change location">🗺️</div>
</header>
<div class="lang-menu" id="lang-menu"></div>
<div class="travel-indicator" id="travel-indicator"><div class="t-dot"></div><span id="travel-status">🧭 Travel Mode</span><button onclick="toggleTravelMode()" style="background:rgba(255,51,85,0.2);color:var(--accent-red);border:1px solid var(--accent-red);border-radius:6px;padding:2px 10px;font-size:0.85em;font-weight:600;cursor:pointer;margin-left:4px">Stop</button></div>

<div class="loc-overlay" id="loc-overlay" onclick="if(event.target===this)toggleLocOverlay(false)">
  <div class="loc-overlay-inner">
    <input type="text" id="location-input" placeholder="Search city, ZIP, or address..." autocomplete="off">
    <div id="loc-suggestions" class="loc-suggestions"></div>
    <div class="loc-overlay-btns">
      <button class="loc-btn-gps" onclick="showLocationConfirm();toggleLocOverlay(false)">🛰️ GPS</button>
      <button class="loc-btn-search" onclick="searchLoc();toggleLocOverlay(false)">🔍 Search</button>
      <button class="loc-btn-close" onclick="toggleLocOverlay(false)">✕</button>
    </div>
    <button class="loc-btn-map" onclick="startMapPick()" style="width:100%;margin-top:6px;padding:8px;background:rgba(0,229,255,0.1);color:var(--accent-cyan);border:1px solid rgba(0,229,255,0.3);border-radius:8px;font-size:0.85em;font-weight:600;cursor:pointer">📌 Set Location from Map</button>
    <button class="travel-btn" id="travel-btn" onclick="toggleTravelMode();toggleLocOverlay(false)">🧭 Travel Mode — Follow GPS Live</button>
    <div style="margin-top:8px;display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:0.75em;color:var(--text-muted);font-weight:600">⭐ Favorites</span>
      <button id="fav-save-btn" onclick="saveFavorite()" style="font-size:0.7em;padding:2px 8px;background:rgba(0,255,136,0.1);color:var(--accent-green);border:1px solid rgba(0,255,136,0.3);border-radius:6px;cursor:pointer;font-weight:600">+ Save Current</button>
    </div>
    <div id="fav-list" style="margin-top:4px"></div>
  </div>
</div>

<div class="container">
  <div id="page-weather" class="section-page visible"></div>
  <div id="page-radar" class="section-page"></div>
  <div id="page-storms" class="section-page"></div>
  <div id="page-station" class="section-page"></div>
  <div id="page-alerts" class="section-page"></div>
</div>

<div class="powered-by">
  100% free &middot; No API keys &middot; No account required<br>
  <a href="https://open-meteo.com" target="_blank">Open-Meteo</a> &middot;
  <a href="https://www.rainviewer.com" target="_blank">RainViewer</a> &middot;
  <a href="https://www.weather.gov" target="_blank">NWS</a> &middot;
  <a href="https://aviationweather.gov" target="_blank">AWC</a>
</div>

<nav class="bottom-nav">
  <button class="nav-item active" data-page="weather"><span class="nav-icon">🌤️</span><span class="nav-label">Weather</span></button>
  <button class="nav-item" data-page="radar"><span class="nav-icon">📡</span><span class="nav-label">Radar</span></button>
  <button class="nav-item" data-page="storms" style="position:relative"><span class="nav-icon">🌪️</span><span class="nav-label">Storms</span><span class="nav-badge" id="nav-storm-badge"></span></button>
  <button class="nav-item" data-page="station"><span class="nav-icon">✈️</span><span class="nav-label">Station</span></button>
  <button class="nav-item" data-page="alerts" style="position:relative"><span class="nav-icon">⚠️</span><span class="nav-label">Alerts</span><span class="nav-badge" id="nav-alert-badge">0</span></button>
</nav>

<script src="js/app.js?v=174b"></script>
</body>
</html>
