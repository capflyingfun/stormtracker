<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StormTracker - Offline</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#05080f;color:#e0e8f0;font-family:'Inter',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
  .container{text-align:center;max-width:400px}
  .icon{font-size:4em;margin-bottom:16px}
  h1{font-size:1.4em;font-weight:700;margin-bottom:8px}
  p{color:#8899aa;font-size:0.9em;line-height:1.6;margin-bottom:20px}
  button{padding:12px 24px;background:rgba(0,229,255,0.1);color:#00e5ff;border:1px solid rgba(0,229,255,0.3);border-radius:10px;font-size:0.9em;font-weight:600;cursor:pointer}
  button:active{background:rgba(0,229,255,0.2)}
</style>
</head>
<body>
<div class="container">
  <div class="icon">⚡</div>
  <h1>StormTracker is Offline</h1>
  <p>You're not connected to the internet. StormTracker needs a connection to fetch live weather data, radar, and storm information.</p>
  <p>Please check your connection and try again.</p>
  <button onclick="location.reload()">Try Again</button>
</div>
</body>
</html>
