name = "stormtracker-proxy"
main = "index.js"
compatibility_date = "2024-01-01"

# D1 database for push subscriptions.
# Create it once with:  wrangler d1 create stormtracker_push
# then paste the printed database_id below.
[[d1_databases]]
binding = "DB"
database_name = "stormtracker_push"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

# Secrets (do NOT put real values here — set with `wrangler secret put NAME`):
#   wrangler secret put SCANNER_SECRET
#
# SCANNER_SECRET is shared with the GitHub Actions scanner so only it can read
# the subscriber list and mark alerts as sent.
